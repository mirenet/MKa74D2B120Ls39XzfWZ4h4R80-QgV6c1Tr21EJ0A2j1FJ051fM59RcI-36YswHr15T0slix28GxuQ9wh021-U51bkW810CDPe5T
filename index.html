<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YouTube Player</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

#player {
    width: 100%;
    height: 100%;
}
</style>

<script>
let player;

function getVideoId() {
    return new URLSearchParams(window.location.search).get("v");
}

function onYouTubeIframeAPIReady() {
    player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        videoId: getVideoId(),

        playerVars: {
            autoplay: 1,
            controls: 0,
            rel: 0,
            playsinline: 1
        },

        events: {
            onReady: onReady,
            onStateChange: onStateChange,
            onError: onError 
        }
    });
}

function onReady(event) {
    event.target.playVideo();
}

function onStateChange(event) {
    if (event.data === YT.PlayerState.PLAYING) {
        // Video je krenuo -> Pokreni/nastavi tajmer na roditeljskoj stranici
        parent.postMessage({
            type: "playing"
        }, "*");
    } 
    else if (event.data === YT.PlayerState.BUFFERING) {
        // Video je stao jer baferuje -> Zaustavi tajmer na roditeljskoj stranici
        parent.postMessage({
            type: "buffering"
        }, "*");
    } 
    else if (event.data === YT.PlayerState.PAUSED) {
        // Korisnik je pauzirao video -> Zaustavi tajmer na roditeljskoj stranici
        parent.postMessage({
            type: "paused"
        }, "*");
    }
    else if (event.data === YT.PlayerState.ENDED) {
        // Video je završen -> Zaustavi/resetuj tajmer na roditeljskoj stranici
        parent.postMessage({
            type: "ended"
        }, "*");
    }
}

// Mrežni osluškivači (za slučaj potpunog nestanka interneta)
window.addEventListener('offline', () => {
    // Konekcija je pukla -> Zaustavi tajmer i obavesti korisnika
    parent.postMessage({
        type: "network_lost"
    }, "*");
});

window.addEventListener('online', () => {
    // Mreža se vratila -> Ovde ne pokrećeš tajmer odmah, 
    // već čekaš da plejer sam pređe u "playing" stanje i pošalje "playing" poruku
    parent.postMessage({
        type: "network_restored"
    }, "*");
});

// Error Handling
const errorMessages = {
    2: "Wrong video-id!",
    5: "Error with player!",
    100: "Video not found!",
    101: "Embed is not allowed!",
    150: "Embed is not allowed!"
};

function onError(event) {
    const code = event.data;
    const message = errorMessages[code] || `Cant play video! (Error: ${code})`;

    parent.postMessage({
        type: "error",
        message: message 
    }, "*");
}
</script>

</head>
<body>
<div id="player"></div>
</body>
</html>
